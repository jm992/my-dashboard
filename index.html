<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Personal Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: white; margin: 0; padding: 20px; }
        .container { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; max-width: 1200px; margin: auto; }
        .card { background: #1e1e1e; padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        h2 { border-bottom: 1px solid #333; padding-bottom: 10px; margin-top: 0; font-size: 1.2rem; color: #00ACED; }
        iframe { width: 100%; border: none; border-radius: 8px; background: white; }
    </style>
</head>
<body>

<div class="container">
    <!-- 1. WEATHER -->
    <div class="card">
        <h2>Local Weather</h2>
        <a class="weatherwidget-io" href="https://forecast7.com/en/40d71n74d01/new-york/?unit=us" data-label_1="Chicago" data-label_2="WEATHER" data-theme="dark" >Chicago WEATHER</a>
        <script>
        !function(d,s,id){var js,fjs=d.getElementsByTagName(s)[0];if(!d.getElementById(id)){js=d.createElement(s);js.id=id;js.src='https://weatherwidget.io/js/widget.min.js';fjs.parentNode.insertBefore(js,fjs);}}(document,'script','weatherwidget-io-js');
        </script>
    </div>

    <!-- 2. METRA TRACKER (UP-N Ravenswood) -->
    <div class="card">
        <h2>Metra UP-N: Ravenswood to Ogilvie</h2>
        <iframe src="https://www.metratracker.com" height="400"></iframe>
        <p style="font-size: 0.8rem; margin-top: 5px;"><a href="https://metra.com/train-lines/stations/ravenswood" target="_blank" style="color: #aaa;">Full Schedule</a></p>
    </div>

    <!-- 3. POLISH WORD OF THE DAY -->
    <div class="card">
        <h2>Polish Word of the Day</h2>
        <iframe src="https://www.innovativelanguage.com" height="180" scrolling="no"></iframe>
    </div>

    <!-- 4. SPANISH WORD OF THE DAY -->
    <div class="card">
        <h2>Spanish Word of the Day</h2>
        <iframe src="https://www.innovativelanguage.com" height="180" scrolling="no"></iframe>
    </div>
</div>

</body>

</html>
